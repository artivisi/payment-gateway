name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Playwright (Java) needs the browser + system libs present before the UI tests run.
      - name: Install Playwright browsers
        run: |
          mvn -B -q test-compile
          mvn -B -q exec:java \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.classpathScope=test \
            -Dexec.args="install --with-deps chromium"

      # `verify` runs the functional suite (Testcontainers needs Docker, present on ubuntu-latest)
      # and the SpotBugs gate (bound to the verify phase; zero findings required).
      - name: Build, test, SpotBugs
        run: mvn -B verify
