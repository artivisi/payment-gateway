name: SonarCloud

# Manual-only (conserves quota). Requires a SonarCloud project + repo secret SONAR_TOKEN,
# and matching sonar.organization / sonar.projectKey in pom.xml.
# Local equivalent: mvn -B clean test-compile sonar:sonar -Dsonar.token=$SONAR_TOKEN
on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history gives SonarCloud accurate new-code / blame attribution.
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # test-compile (not verify) builds main + test sources without running the suite —
      # analysis only needs the bytecode. No JaCoCo coverage yet (pending Java 25 support).
      - name: Build + analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean test-compile sonar:sonar -Dsonar.token=$SONAR_TOKEN
