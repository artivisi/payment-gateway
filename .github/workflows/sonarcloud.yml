name: SonarCloud

# Manual-only (conserves quota). Requires a SonarCloud project + repo secret SONAR_TOKEN,
# and matching sonar.organization / sonar.projectKey in pom.xml.
# Local equivalent: mvn -B clean verify sonar:sonar -Dsonar.token=$SONAR_TOKEN
on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history gives SonarCloud accurate new-code / blame attribution.
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # verify runs the suite under the JaCoCo agent (Testcontainers needs Docker, present on
      # ubuntu-latest) so Sonar gets coverage from target/site/jacoco/jacoco.xml.
      - name: Build, test, analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean verify sonar:sonar -Dsonar.token=$SONAR_TOKEN
