services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: paymentgateway
      POSTGRES_USER: paymentgateway
      POSTGRES_PASSWORD: paymentgateway
    ports:
      - "5432:5432"
    volumes:
      # postgres:18 expects the mount at /var/lib/postgresql (data lives in a version subdir).
      - db-paymentgateway:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paymentgateway -d paymentgateway"]
      interval: 5s
      timeout: 3s
      retries: 10

  # End-to-end app stack. Values below are local-dev throwaways — override for any real deployment
  # (the app itself fails loud if these are absent; there are no in-app defaults).
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      GATEWAY_DB_URL: jdbc:postgresql://db:5432/paymentgateway
      GATEWAY_DB_USERNAME: paymentgateway
      GATEWAY_DB_PASSWORD: paymentgateway
      # base64 of 32 zero-ish bytes — local dev only; generate a real key for prod.
      GATEWAY_SECRET_KEY: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: change-me-on-first-login
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  db-paymentgateway:
