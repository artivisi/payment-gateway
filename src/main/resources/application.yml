spring:
  application:
    name: payment-gateway
  # No defaults: missing DB config fails startup (fail loud).
  datasource:
    url: ${GATEWAY_DB_URL}
    username: ${GATEWAY_DB_USERNAME}
    password: ${GATEWAY_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway is the single source of truth for schema.
      ddl-auto: none
  flyway:
    enabled: true

gateway:
  security:
    # Base64-encoded 32-byte (AES-256) key. Required; app fails to start if absent or wrong length.
    secret-key: ${GATEWAY_SECRET_KEY}
  webhook:
    max-attempts: 6
    backoff-base-seconds: 30
    poll-interval-ms: 5000
    request-timeout-seconds: 10
  reversal:
    window-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
