server:
  # Honour X-Forwarded-* from a trusted proxy so the bank IP allowlist sees the real client IP.
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 15m            # PCI Req 8.2.8 idle timeout
      tracking-modes: cookie
      cookie:
        http-only: true
        same-site: strict
        # 'secure' intentionally unset: Tomcat sets it when the request is HTTPS (prod terminates TLS),
        # while local/test traffic over HTTP still works.

spring:
  application:
    name: payment-gateway
  # No defaults: missing DB config fails startup (fail loud).
  datasource:
    url: ${GATEWAY_DB_URL}
    username: ${GATEWAY_DB_USERNAME}
    password: ${GATEWAY_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway is the single source of truth for schema.
      ddl-auto: none
  flyway:
    enabled: true

gateway:
  security:
    # Base64-encoded 32-byte (AES-256) key. Required; app fails to start if absent or wrong length.
    secret-key: ${GATEWAY_SECRET_KEY}
  admin:
    # First ADMIN, seeded when the operator table is empty. Required (fail loud); change + enrol MFA
    # are forced on first login.
    bootstrap:
      username: ${GATEWAY_ADMIN_USERNAME}
      password: ${GATEWAY_ADMIN_PASSWORD}
    max-failed-attempts: 10   # PCI Req 8.3.4
    lock-minutes: 30
    mfa:
      issuer: ArtiVisi Payment Gateway
  webhook:
    max-attempts: 6
    backoff-base-seconds: 30
    poll-interval-ms: 5000
    request-timeout-seconds: 10
    per-consumer-concurrency: 4
    batch-size: 100
    stale-sending-seconds: 120
    http:
      max-connections-per-host: 16
      connect-timeout-ms: 5000
      pending-acquire-timeout-ms: 5000
  reversal:
    window-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
