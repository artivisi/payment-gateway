<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' · Payment Gateway'">Payment Gateway</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/logo-artivisi.svg}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script defer th:src="@{/js/htmx.min.js}"></script>
</head>
<body>
<header th:fragment="navbar(active)" class="bg-primary-600 text-white">
    <div class="mx-auto flex max-w-6xl items-center gap-6 px-4 py-3">
        <a th:href="@{/admin}" class="flex items-center gap-2">
            <img th:src="@{/img/logo-artivisi-white.svg}" alt="ArtiVisi" class="h-7 w-auto"/>
            <span class="text-sm font-semibold tracking-wide">Payment Gateway</span>
        </a>
        <nav class="flex items-center gap-1 text-sm">
            <a th:href="@{/admin}" th:classappend="${active == 'dashboard'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Dashboard</a>
            <a sec:authorize="hasAuthority('ESCROW_VIEW')" th:href="@{/admin/escrow-accounts}"
               th:classappend="${active == 'escrow'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Escrows</a>
            <a sec:authorize="hasAuthority('CONSUMER_VIEW')" th:href="@{/admin/consumers}"
               th:classappend="${active == 'consumer'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Consumers</a>
            <a sec:authorize="hasAuthority('CHARGE_VIEW')" th:href="@{/admin/charges}"
               th:classappend="${active == 'charge'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Charges</a>
            <a sec:authorize="hasAuthority('PAYMENT_VIEW')" th:href="@{/admin/payments}"
               th:classappend="${active == 'payment'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Payments</a>
            <a sec:authorize="hasAuthority('RECONCILIATION_VIEW')" th:href="@{/admin/reconciliations}"
               th:classappend="${active == 'reconciliation'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Reconciliation</a>
            <a sec:authorize="hasAuthority('WEBHOOK_VIEW')" th:href="@{/admin/webhooks}"
               th:classappend="${active == 'webhook'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Webhooks</a>
            <a sec:authorize="hasAuthority('AUDIT_VIEW')" th:href="@{/admin/audit}"
               th:classappend="${active == 'audit'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Audit</a>
            <a sec:authorize="hasAuthority('OPERATOR_MANAGE')" th:href="@{/admin/operators}"
               th:classappend="${active == 'operator'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Operators</a>
            <a sec:authorize="hasAuthority('ROLE_MANAGE')" th:href="@{/admin/roles}"
               th:classappend="${active == 'role'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Roles</a>
            <a sec:authorize="hasAuthority('BANK_IP_MANAGE')" th:href="@{/admin/bank-ip-rules}"
               th:classappend="${active == 'bankip'} ? 'bg-primary-700' : ''"
               class="rounded px-3 py-1.5 hover:bg-primary-700">Bank IP</a>
        </nav>
        <div class="ml-auto flex items-center gap-3 text-sm">
            <span class="opacity-90" sec:authentication="name">user</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="rounded bg-primary-700 px-3 py-1.5 hover:bg-primary-800">Sign out</button>
            </form>
        </div>
    </div>
</header>
</body>
</html>
