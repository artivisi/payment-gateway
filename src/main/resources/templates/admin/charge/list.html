<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Charges')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('charge')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-8" data-testid="charge-list">
    <div class="mb-4 flex flex-wrap items-start justify-between gap-3">
        <div>
            <h1 class="page-title">Charges</h1>
            <p class="page-sub">Debts created by consumers, payable through one or more bank VAs.</p>
        </div>
        <div th:replace="~{fragments :: searchBox(${q}, '/admin/charges', 'status', ${status})}"></div>
    </div>
    <div th:replace="~{fragments :: chips(${chips})}"></div>
    <div class="card overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="th">Reference</th>
                <th class="th">Consumer</th>
                <th class="th">Payer</th>
                <th class="th">Type</th>
                <th class="th">Active VA</th>
                <th class="th text-right">Amount</th>
                <th class="th text-right">Paid</th>
                <th class="th">Status</th>
                <th class="th">Created</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="r : ${rows}" class="hover:bg-slate-50">
                <td class="td">
                    <span class="inline-flex items-center gap-1.5">
                        <a class="font-mono font-medium text-primary-700 hover:underline"
                           th:href="@{/admin/charges/{id}(id=${r.fullId})}" th:title="${r.fullId}" th:text="${r.shortId}">ref</a>
                        <button type="button" class="rounded p-0.5 text-slate-400 hover:bg-slate-100 hover:text-slate-700"
                                title="Copy full reference" th:attr="data-copy=${r.fullId}"
                                onclick="navigator.clipboard &amp;&amp; navigator.clipboard.writeText(this.dataset.copy)">
                            <svg class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="7" y="7" width="9" height="9" rx="1.5"/><path d="M13 7V5.5A1.5 1.5 0 0011.5 4h-6A1.5 1.5 0 004 5.5v6A1.5 1.5 0 005.5 13H7"/></svg>
                        </button>
                    </span>
                </td>
                <td class="td" th:text="${r.consumerCode}">consumer</td>
                <td class="td max-w-[160px] overflow-hidden text-ellipsis" th:title="${r.payer}" th:text="${r.payer}">payer</td>
                <td class="td"><span class="badge-muted" th:text="${r.type}">CLOSED</span></td>
                <td class="td font-mono text-xs text-slate-600" th:text="${r.bankVa}">bank va</td>
                <td class="td text-right font-mono text-xs" th:text="${r.amount}">0</td>
                <td class="td text-right font-mono text-xs" th:classappend="${r.paidClass}" th:text="${r.paid}">0</td>
                <td class="td"><span th:classappend="${r.statusClass}" th:text="${r.status}">ACTIVE</span></td>
                <td class="td text-xs text-slate-500" th:title="${r.createdFull}" th:text="${r.created}">time</td>
            </tr>
            <tr th:if="${rows.isEmpty()}">
                <td class="td text-slate-400" colspan="9">No charges match your search.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${charges.totalPages > 1}" class="mt-4 flex items-center justify-between text-sm">
        <span class="text-slate-500"
              th:text="'Page ' + (${charges.number} + 1) + ' / ' + ${charges.totalPages} + ' &middot; ' + ${charges.totalElements} + ' total'">Page</span>
        <div class="flex gap-2">
            <a th:if="${charges.hasPrevious()}" th:href="@{/admin/charges(page=${charges.number - 1}, q=${q}, status=${status})}"
               class="btn-ghost px-3 py-1">Prev</a>
            <a th:if="${charges.hasNext()}" th:href="@{/admin/charges(page=${charges.number + 1}, q=${q}, status=${status})}"
               class="btn-ghost px-3 py-1">Next</a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
