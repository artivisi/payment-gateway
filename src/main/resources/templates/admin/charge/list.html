<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Charges')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('charge')}"></nav>
<main class="mx-auto max-w-6xl px-4 py-8" data-testid="charge-list">
    <h1 class="mb-6 text-2xl font-semibold text-slate-900">Charges</h1>
    <div class="card overflow-hidden">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="th">Reference</th>
                <th class="th">Consumer</th>
                <th class="th">Payer</th>
                <th class="th">Type</th>
                <th class="th">Amount</th>
                <th class="th">Paid</th>
                <th class="th">Status</th>
                <th class="th">Created</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="c : ${charges}">
                <td class="td">
                    <a class="font-medium text-primary-700 hover:underline"
                       th:href="@{/admin/charges/{id}(id=${c.id})}" th:text="${c.consumerReference}">ref</a>
                </td>
                <td class="td" th:text="${c.consumer.code}">consumer</td>
                <td class="td" th:text="${c.payerName}">payer</td>
                <td class="td"><span class="badge-muted" th:text="${c.chargeType}">CLOSED</span></td>
                <td class="td font-mono text-xs" th:text="${c.amount}">0</td>
                <td class="td font-mono text-xs" th:text="${c.cumulativePaid}">0</td>
                <td class="td">
                    <span th:classappend="${c.status.name() == 'PAID'} ? 'badge-ok' : 'badge-muted'"
                          th:text="${c.status}">ACTIVE</span>
                </td>
                <td class="td text-xs text-slate-500" th:text="${c.createdAt}">time</td>
            </tr>
            <tr th:if="${#lists.isEmpty(charges)}">
                <td class="td text-slate-400" colspan="8">No charges yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
