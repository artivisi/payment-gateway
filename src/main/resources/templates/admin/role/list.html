<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Roles')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('role')}"></nav>
<main class="mx-auto max-w-5xl px-4 py-8" data-testid="role-list">
    <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-slate-900">Roles</h1>
        <a th:href="@{/admin/roles/new}" class="btn-primary">New role</a>
    </div>

    <div th:if="${message}" class="mb-4 rounded-md bg-accent-50 px-4 py-3 text-sm text-accent-800" th:text="${message}"></div>
    <div th:if="${error}" class="mb-4 rounded-md bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${error}"></div>

    <div class="card overflow-hidden">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="th">Name</th>
                <th class="th">Label</th>
                <th class="th">Permissions</th>
                <th class="th">Built-in</th>
                <th class="th">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="r : ${roles}">
                <td class="td font-medium text-slate-900" th:text="${r.name}">ROLE</td>
                <td class="td" th:text="${r.label}">label</td>
                <td class="td text-xs text-slate-500"
                    th:text="${r.allPermissions} ? 'All permissions' : ${r.permissions.size()} + ' permission(s)'">n</td>
                <td class="td" th:text="${r.builtIn} ? 'Yes' : 'No'">No</td>
                <td class="td">
                    <div class="flex items-center gap-2">
                        <a th:unless="${r.allPermissions}" th:href="@{/admin/roles/{id}/edit(id=${r.id})}"
                           class="text-xs font-medium text-primary-700 hover:underline">Edit</a>
                        <form th:unless="${r.builtIn}" method="post" th:action="@{/admin/roles/{id}/delete(id=${r.id})}">
                            <button class="text-xs font-medium text-rose-700 hover:underline">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
