<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Roles')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('role')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-8" data-testid="role-list">
    <div class="mb-6 flex flex-wrap items-start justify-between gap-3">
        <div>
            <h1 class="page-title">Roles</h1>
            <p class="page-sub">Permission sets assignable to operators. Built-in roles cannot be deleted.</p>
        </div>
        <a th:href="@{/admin/roles/new}" class="btn-primary shrink-0">New role</a>
    </div>

    <div th:if="${message}" class="flash-ok" th:text="${message}"></div>
    <div th:if="${error}" class="flash-error" th:text="${error}"></div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
        <div th:each="r : ${roles}" class="item-card item-card-on">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <p class="text-base font-semibold text-slate-900" th:text="${r.name}">ROLE</p>
                    <p class="text-sm text-slate-500" th:text="${r.label}">label</p>
                </div>
                <span th:if="${r.builtIn}" class="badge-muted">Built-in</span>
            </div>
            <div class="mt-4">
                <span class="badge-muted"
                      th:text="${r.allPermissions} ? 'All permissions' : ${r.permissions.size()} + ' permission(s)'">n</span>
            </div>
            <div class="mt-4 flex items-center gap-3 border-t border-slate-100 pt-3"
                 th:if="${!r.allPermissions or !r.builtIn}">
                <a th:unless="${r.allPermissions}" th:href="@{/admin/roles/{id}/edit(id=${r.id})}"
                   class="action-link">Edit</a>
                <form th:unless="${r.builtIn}" method="post" th:action="@{/admin/roles/{id}/delete(id=${r.id})}">
                    <button class="action-link-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
