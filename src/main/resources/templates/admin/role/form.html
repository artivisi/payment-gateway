<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Role')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('role')}"></nav>
<main class="mx-auto max-w-2xl px-4 py-8" data-testid="role-form">
    <h1 class="mb-6 text-2xl font-semibold text-slate-900"
        th:text="${role != null} ? 'Edit role' : 'New role'">Role</h1>

    <div th:if="${error}" class="mb-4 rounded-md bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${error}"></div>

    <form th:action="${role != null} ? @{/admin/roles/{id}(id=${role.id})} : @{/admin/roles}"
          method="post" class="card space-y-4 p-6">
        <div>
            <label for="name" class="block text-sm font-medium text-slate-700">Name</label>
            <input id="name" name="name" type="text" required
                   th:value="${role != null} ? ${role.name} : ''"
                   th:readonly="${role != null}"
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
        </div>
        <div>
            <label for="label" class="block text-sm font-medium text-slate-700">Label</label>
            <input id="label" name="label" type="text"
                   th:value="${role != null} ? ${role.label} : ''"
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
        </div>
        <fieldset>
            <legend class="block text-sm font-medium text-slate-700">Permissions</legend>
            <div class="mt-2 grid grid-cols-2 gap-2">
                <label th:each="p : ${permissions}" class="flex items-center gap-2 text-sm">
                    <input type="checkbox" name="permissions" th:value="${p}"
                           th:checked="${role != null and role.permissions.contains(p)}"/>
                    <span th:text="${p}" class="font-mono text-xs">PERM</span>
                </label>
            </div>
        </fieldset>
        <div class="flex gap-2">
            <button type="submit" class="btn-primary">Save</button>
            <a th:href="@{/admin/roles}" class="rounded-md border border-slate-300 px-4 py-2 text-sm">Cancel</a>
        </div>
    </form>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
