<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Bank IP allowlist')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('bankip')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-8" data-testid="bank-ip-rule-list">
    <div class="mb-6">
        <h1 class="page-title">Bank IP allowlist</h1>
        <p class="page-sub">
            Per-provider source-IP allowlist for bank callback endpoints. A provider with no enabled rule is
            unrestricted; otherwise only listed CIDRs may call it (others get HTTP 403).
        </p>
    </div>

    <div th:if="${message}" class="flash-ok" th:text="${message}"></div>
    <div th:if="${error}" class="flash-error" th:text="${error}"></div>

    <form th:action="@{/admin/bank-ip-rules}" method="post" class="card mb-6 flex flex-wrap items-end gap-3 p-5">
        <div>
            <label for="provider" class="label">Provider</label>
            <select id="provider" name="provider" class="input">
                <option value="bsi">bsi</option>
                <option value="cimb">cimb</option>
                <option value="maybank">maybank</option>
            </select>
        </div>
        <div>
            <label for="cidr" class="label">CIDR / IP</label>
            <input id="cidr" name="cidr" type="text" required placeholder="203.0.113.0/24"
                   class="input font-mono"/>
        </div>
        <div class="grow">
            <label for="label" class="label">Label</label>
            <input id="label" name="label" type="text" placeholder="Bank prod egress" class="input"/>
        </div>
        <button type="submit" class="btn-primary">Add rule</button>
    </form>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
        <div th:each="r : ${rules}" class="item-card"
             th:classappend="${r.enabled} ? 'item-card-on' : 'item-card-off'">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <p class="text-base font-semibold text-slate-900" th:text="${r.provider}">bsi</p>
                    <p class="font-mono text-sm text-slate-600" th:text="${r.cidr}">cidr</p>
                </div>
                <span th:classappend="${r.enabled} ? 'badge-ok' : 'badge-muted'"
                      th:text="${r.enabled} ? 'Enabled' : 'Disabled'">Enabled</span>
            </div>
            <p class="mt-2 text-sm text-slate-500" th:text="${r.label} ?: '—'">label</p>
            <div class="mt-4 flex items-center gap-3 border-t border-slate-100 pt-3">
                <form th:if="${r.enabled}" method="post" th:action="@{/admin/bank-ip-rules/{id}/disable(id=${r.id})}">
                    <button class="action-link-warn">Disable</button>
                </form>
                <form th:unless="${r.enabled}" method="post" th:action="@{/admin/bank-ip-rules/{id}/enable(id=${r.id})}">
                    <button class="action-link">Enable</button>
                </form>
                <form method="post" th:action="@{/admin/bank-ip-rules/{id}/delete(id=${r.id})}">
                    <button class="action-link-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(rules)}" class="empty-state">
        No rules — all providers unrestricted.
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
