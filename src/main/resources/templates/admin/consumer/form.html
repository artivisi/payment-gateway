<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('New Consumer')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('consumer')}"></nav>
<main class="mx-auto max-w-2xl px-4 py-8" data-testid="consumer-form">
    <h1 class="mb-6 text-2xl font-semibold text-slate-900">New Consumer</h1>

    <div th:if="${error}" class="mb-4 rounded-md bg-red-50 px-4 py-3 text-sm text-red-700" th:text="${error}"></div>

    <form th:action="@{/admin/consumers}" method="post" class="card space-y-4 p-6">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div>
                <label class="label" for="code">Code</label>
                <input class="input" id="code" name="code" required data-testid="code"/>
            </div>
            <div>
                <label class="label" for="name">Name</label>
                <input class="input" id="name" name="name" required data-testid="name"/>
            </div>
            <div>
                <label class="label" for="clientId">Client ID</label>
                <input class="input" id="clientId" name="clientId" required data-testid="client-id"/>
            </div>
            <div>
                <label class="label" for="clientSecret">Client secret</label>
                <input class="input" id="clientSecret" name="clientSecret" type="password" required data-testid="client-secret"/>
            </div>
        </div>
        <div>
            <label class="label" for="webhookUrl">Webhook URL</label>
            <input class="input" id="webhookUrl" name="webhookUrl" type="url" required data-testid="webhook-url"/>
        </div>
        <div>
            <label class="label" for="status">Status</label>
            <select class="input" id="status" name="status" data-testid="status">
                <option>ACTIVE</option>
                <option>INACTIVE</option>
            </select>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="btn-primary" data-testid="form-submit">Create consumer</button>
            <a th:href="@{/admin/consumers}" class="btn-ghost">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
