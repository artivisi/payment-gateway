<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Webhook deliveries')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('webhook')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-8" data-testid="webhook-list">
    <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-slate-900">Webhook deliveries</h1>
        <span th:if="${consumer}" class="text-sm text-slate-500">
            consumer: <span class="font-mono" th:text="${consumer}">code</span>
            <a th:href="@{/admin/webhooks(status=${selected})}" class="ml-2 text-primary-700 hover:underline">clear</a>
        </span>
    </div>

    <div th:if="${message}" class="mb-4 rounded-md bg-accent-50 px-4 py-3 text-sm text-accent-800"
         th:text="${message}"></div>

    <div class="mb-4 flex gap-1 text-sm">
        <a th:each="s : ${statuses}"
           th:href="@{/admin/webhooks(status=${s}, consumer=${consumer})}"
           th:classappend="${s == selected} ? 'bg-primary-600 text-white' : 'bg-white text-slate-600'"
           class="rounded border border-slate-200 px-3 py-1.5 hover:bg-primary-50"
           th:text="${s}">FAILED</a>
    </div>

    <div class="card overflow-hidden">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="th">Last attempt</th>
                <th class="th">Consumer</th>
                <th class="th">Charge ref</th>
                <th class="th">Event</th>
                <th class="th">Attempts</th>
                <th class="th">HTTP</th>
                <th class="th">Last error</th>
                <th class="th">Target</th>
                <th class="th"></th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="d : ${deliveries}">
                <td class="td text-xs text-slate-500" th:text="${d.updatedAt}">time</td>
                <td class="td font-medium text-slate-900" th:text="${d.consumer.code}">consumer</td>
                <td class="td font-mono text-xs" th:text="${d.charge.consumerReference}">ref</td>
                <td class="td" th:text="${d.eventType}">event</td>
                <td class="td text-xs" th:text="${d.attempts} + '/' + ${d.maxAttempts}">6/6</td>
                <td class="td text-xs" th:text="${d.lastResponseCode} ?: '—'">500</td>
                <td class="td max-w-xs truncate text-xs text-rose-700" th:title="${d.lastError}"
                    th:text="${d.lastError} ?: '—'">error</td>
                <td class="td max-w-xs truncate text-xs text-slate-500" th:title="${d.targetUrl}"
                    th:text="${d.targetUrl}">url</td>
                <td class="td">
                    <form th:if="${d.status.name() == 'FAILED'}" method="post"
                          th:action="@{/admin/webhooks/{id}/replay(id=${d.id})}">
                        <input type="hidden" name="status" th:value="${selected}"/>
                        <input type="hidden" name="consumer" th:value="${consumer}"/>
                        <button type="submit" class="text-xs font-medium text-primary-700 hover:underline">Replay</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(deliveries)}">
                <td class="td text-slate-400" colspan="9">No deliveries in this state.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <p class="mt-3 text-xs text-slate-400">Showing up to 200, newest attempt first.</p>
</main>
</body>
</html>
