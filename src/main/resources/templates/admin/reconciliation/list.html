<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Reconciliation')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('reconciliation')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-8" data-testid="reconciliation-list">
    <div class="mb-6">
        <h1 class="page-title">Reconciliation runs</h1>
        <p class="page-sub">End-of-day settlement matching per escrow account, from the bank's CSV.</p>
    </div>

    <div th:if="${message}" class="flash-ok" th:text="${message}"></div>
    <div th:if="${error}" class="flash-error" th:text="${error}"></div>

    <div class="card mb-6 p-6">
        <h2 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-500">Run reconciliation</h2>
        <form th:action="@{/admin/reconciliations/import}" method="post" enctype="multipart/form-data"
              class="grid grid-cols-1 gap-4 sm:grid-cols-3">
            <div>
                <label class="label" for="escrowCode">Escrow</label>
                <select class="input" id="escrowCode" name="escrowCode" required data-testid="escrow-code">
                    <option value="">— select —</option>
                    <option th:each="e : ${escrows}" th:value="${e.code}" th:text="${e.code}">code</option>
                </select>
            </div>
            <div>
                <label class="label" for="period">Period (date)</label>
                <input class="input" id="period" name="period" type="date" required data-testid="period"/>
            </div>
            <div>
                <label class="label" for="file">Settlement CSV</label>
                <input class="input" id="file" name="file" type="file" accept=".csv,text/csv" required data-testid="settlement-file"/>
            </div>
            <div class="sm:col-span-3">
                <button type="submit" class="btn-primary" data-testid="form-submit">Run</button>
            </div>
        </form>
    </div>
    <div class="card overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="th">Created</th>
                <th class="th">Escrow</th>
                <th class="th">Period</th>
                <th class="th">Status</th>
                <th class="th text-right">Matched</th>
                <th class="th text-right">Recovered</th>
                <th class="th text-right">Discrepancies</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="r : ${runs}" class="hover:bg-slate-50">
                <td class="td text-xs text-slate-500">
                    <a class="text-primary-700 hover:underline"
                       th:href="@{/admin/reconciliations/{id}(id=${r.id})}" th:text="${r.createdAt}">time</a>
                </td>
                <td class="td" th:text="${r.escrowAccount.code}">escrow</td>
                <td class="td" th:text="${r.period}">period</td>
                <td class="td"><span class="badge-muted" th:text="${r.status}">COMPLETED</span></td>
                <td class="td text-right" th:text="${r.matchedCount}">0</td>
                <td class="td text-right text-accent-700" th:text="${r.recoveredCount}">0</td>
                <td class="td text-right">
                    <span th:classappend="${r.discrepancyCount > 0} ? 'badge-warn' : 'badge-muted'"
                          th:text="${r.discrepancyCount}">0</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(runs)}">
                <td class="td text-slate-400" colspan="7">No reconciliation runs yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
