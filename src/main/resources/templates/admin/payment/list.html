<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Payments')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('payment')}"></nav>
<main class="mx-auto max-w-6xl px-4 py-8" data-testid="payment-list">
    <h1 class="mb-6 text-2xl font-semibold text-slate-900">Payments</h1>
    <div class="card overflow-hidden">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="th">Time</th>
                <th class="th">VA number</th>
                <th class="th">Bank reference</th>
                <th class="th">Amount</th>
                <th class="th">Status</th>
                <th class="th">Charge</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="p : ${payments}">
                <td class="td text-xs text-slate-500" th:text="${p.transactionTime}">time</td>
                <td class="td font-mono text-xs" th:text="${p.virtualAccount.vaNumber}">va</td>
                <td class="td font-mono text-xs" th:text="${p.bankReference}">ref</td>
                <td class="td font-mono text-xs" th:text="${p.amount}">0</td>
                <td class="td">
                    <span th:classappend="${p.status.name() == 'ACCEPTED'} ? 'badge-ok' : 'badge-muted'"
                          th:text="${p.status}">ACCEPTED</span>
                </td>
                <td class="td">
                    <a class="text-primary-700 hover:underline"
                       th:href="@{/admin/charges/{id}(id=${p.charge.id})}" th:text="${p.charge.consumerReference}">ref</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(payments)}">
                <td class="td text-slate-400" colspan="6">No payments yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
