<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('New operator')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('operator')}"></nav>
<main class="mx-auto max-w-lg px-4 py-8" data-testid="operator-form">
    <h1 class="mb-6 text-2xl font-semibold text-slate-900">New operator</h1>

    <div th:if="${error}" class="mb-4 rounded-md bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${error}"></div>

    <form th:action="@{/admin/operators}" method="post" class="card space-y-4 p-6">
        <div>
            <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
            <input id="username" name="username" type="text" required
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
        </div>
        <div>
            <label for="fullName" class="block text-sm font-medium text-slate-700">Full name</label>
            <input id="fullName" name="fullName" type="text" required
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
        </div>
        <div>
            <label for="role" class="block text-sm font-medium text-slate-700">Role</label>
            <select id="role" name="roleId" class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2">
                <option th:each="r : ${roles}" th:value="${r.id}"
                        th:text="${r.label} ?: ${r.name}">ROLE</option>
            </select>
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-slate-700">Temporary password</label>
            <input id="password" name="password" type="password" required minlength="12"
                   class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
            <p class="mt-1 text-xs text-slate-500">Min 12 chars. The operator changes it and enrols MFA on first login.</p>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="btn-primary">Create</button>
            <a th:href="@{/admin/operators}" class="rounded-md border border-slate-300 px-4 py-2 text-sm">Cancel</a>
        </div>
    </form>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
