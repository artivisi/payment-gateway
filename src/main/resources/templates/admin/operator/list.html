<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Operators')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('operator')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-8" data-testid="operator-list">
    <div class="mb-6 flex flex-wrap items-start justify-between gap-3">
        <div>
            <h1 class="page-title">Operators</h1>
            <p class="page-sub">Admin UI accounts. Every operator has one role; MFA is mandatory.</p>
        </div>
        <a th:href="@{/admin/operators/new}" class="btn-primary shrink-0">New operator</a>
    </div>

    <div th:if="${message}" class="flash-ok" th:text="${message}"></div>
    <div th:if="${error}" class="flash-error" th:text="${error}"></div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
        <div th:each="o : ${operators}" class="item-card"
             th:classappend="${o.locked} ? 'item-card-warn' : (${o.enabled} ? 'item-card-on' : 'item-card-off')">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <p class="text-base font-semibold text-slate-900" th:text="${o.username}">user</p>
                    <p class="text-sm text-slate-500" th:text="${o.fullName}">name</p>
                </div>
                <span class="badge-muted" th:text="${o.role.name}">ROLE</span>
            </div>
            <div class="mt-4 space-y-2">
                <div class="meta-row">
                    <span class="meta-key">Status</span>
                    <span class="flex flex-wrap justify-end gap-1">
                        <span th:classappend="${o.enabled} ? 'badge-ok' : 'badge-muted'"
                              th:text="${o.enabled} ? 'Enabled' : 'Disabled'">Enabled</span>
                        <span th:if="${o.locked}" class="badge-danger">Locked</span>
                    </span>
                </div>
                <div class="meta-row">
                    <span class="meta-key">MFA</span>
                    <span th:classappend="${o.mfaEnabled} ? 'badge-ok' : 'badge-warn'"
                          th:text="${o.mfaEnabled} ? 'Enrolled' : 'Pending'">Enrolled</span>
                </div>
                <div class="meta-row">
                    <span class="meta-key">Last login</span>
                    <span class="text-xs text-slate-500" th:text="${o.lastLoginAt} ?: '—'">—</span>
                </div>
            </div>
            <div class="mt-4 space-y-3 border-t border-slate-100 pt-3">
                <div class="flex flex-wrap items-center gap-3">
                    <a th:href="@{/admin/operators/{id}/edit(id=${o.id})}" class="action-link">Edit</a>
                    <form th:if="${o.enabled}" method="post" th:action="@{/admin/operators/{id}/disable(id=${o.id})}">
                        <button class="action-link-warn">Disable</button>
                    </form>
                    <form th:unless="${o.enabled}" method="post" th:action="@{/admin/operators/{id}/enable(id=${o.id})}">
                        <button class="action-link">Enable</button>
                    </form>
                    <form method="post" th:action="@{/admin/operators/{id}/reset-mfa(id=${o.id})}">
                        <button class="action-link-warn">Reset MFA</button>
                    </form>
                </div>
                <form method="post" th:action="@{/admin/operators/{id}/reset-password(id=${o.id})}"
                      class="flex items-center gap-2">
                    <input name="password" type="password" placeholder="temp pwd (12+)" minlength="12" required
                           class="input w-40 px-2 py-1 text-xs"/>
                    <button class="action-link shrink-0">Reset password</button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(operators)}" class="empty-state">No operators.</div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
