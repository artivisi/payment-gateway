<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dashboard')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('dashboard')}"></nav>
<main class="mx-auto max-w-6xl px-4 py-8" data-testid="dashboard">
    <h1 class="mb-6 text-2xl font-semibold text-slate-900">Dashboard</h1>
    <div class="grid grid-cols-2 gap-4 sm:grid-cols-4">
        <div class="card p-5">
            <p class="text-sm text-slate-500">Escrows</p>
            <p class="mt-1 text-3xl font-semibold text-primary-700" th:text="${escrowCount}">0</p>
        </div>
        <div class="card p-5">
            <p class="text-sm text-slate-500">Consumers</p>
            <p class="mt-1 text-3xl font-semibold text-primary-700" th:text="${consumerCount}">0</p>
        </div>
        <div class="card p-5">
            <p class="text-sm text-slate-500">Charges</p>
            <p class="mt-1 text-3xl font-semibold text-primary-700" th:text="${chargeCount}">0</p>
        </div>
        <div class="card p-5">
            <p class="text-sm text-slate-500">Payments</p>
            <p class="mt-1 text-3xl font-semibold text-accent-600" th:text="${paymentCount}">0</p>
        </div>
    </div>

    <div class="mt-8 flex gap-3">
        <a th:href="@{/admin/escrow-accounts/new}" class="btn-primary">New escrow account</a>
        <a th:href="@{/admin/consumers/new}" class="btn-ghost">New consumer</a>
    </div>
</main>
</body>
</html>
