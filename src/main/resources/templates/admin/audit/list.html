<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Audit log')}"></head>
<body class="bg-slate-50 text-slate-800">
<nav th:replace="~{fragments :: navbar('audit')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-8" data-testid="audit-list">
    <div class="mb-6 flex flex-wrap items-start justify-between gap-3">
        <div>
            <h1 class="page-title">Audit log</h1>
            <p class="page-sub">Every state-changing action, with its authenticated actor.</p>
        </div>
        <div th:replace="~{fragments :: searchBox(${q}, '/admin/audit')}"></div>
    </div>
    <div class="card overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
            <tr>
                <th class="th">Time</th>
                <th class="th">Actor</th>
                <th class="th">Event</th>
                <th class="th">Entity</th>
                <th class="th">Entity ID</th>
                <th class="th">Detail</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="e : ${events}" class="hover:bg-slate-50">
                <td class="td text-xs text-slate-500" th:text="${e.createdAt}">time</td>
                <td class="td text-xs" th:text="${e.actor} ?: '—'">actor</td>
                <td class="td" th:text="${e.eventType}">event</td>
                <td class="td" th:text="${e.entityType}">entity</td>
                <td class="td font-mono text-xs" th:text="${e.entityId} ?: '—'">id</td>
                <td class="td text-xs text-slate-500" th:text="${e.detail}">detail</td>
            </tr>
            <tr th:if="${events.isEmpty()}">
                <td class="td text-slate-400" colspan="6">No audit events found.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{fragments :: pagination(${events}, ${q}, '/admin/audit')}"></div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
