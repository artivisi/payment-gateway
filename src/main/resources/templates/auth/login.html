<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Sign in')}"></head>
<body class="bg-slate-100 text-slate-800">
<main class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-4" data-testid="login-page">
    <div class="card p-8">
        <div class="mb-6 flex flex-col items-center gap-3">
            <img th:src="@{/img/logo.svg}" alt="Payment Gateway" class="h-14 w-auto"/>
            <span class="text-lg font-semibold text-slate-900">Payment Gateway</span>
        </div>

        <div th:if="${param.error}" class="flash-error">
            Invalid credentials, or the account is locked or disabled.
        </div>
        <div th:if="${param.logout}" class="flash-ok">
            You have been signed out.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">
            <div>
                <label for="username" class="label">Username</label>
                <input id="username" name="username" type="text" required autofocus
                       data-testid="username" class="input"/>
            </div>
            <div>
                <label for="password" class="label">Password</label>
                <input id="password" name="password" type="password" required
                       data-testid="password" class="input"/>
            </div>
            <button type="submit" class="btn-primary w-full" data-testid="login-submit">Sign in</button>
        </form>
    </div>
    <p class="mt-4 text-center text-xs text-slate-400">Powered by ArtiVisi Payment Gateway</p>
</main>
</body>
</html>
