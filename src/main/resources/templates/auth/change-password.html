<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Change password')}"></head>
<body class="bg-slate-100 text-slate-800">
<main class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-4" data-testid="change-password-page">
    <div class="card p-8">
        <h1 class="mb-2 text-lg font-semibold text-slate-900">Set a new password</h1>
        <p class="mb-6 text-sm text-slate-500">Minimum 12 characters. Required before continuing.</p>

        <div th:if="${error}" class="mb-4 rounded-md bg-rose-50 px-4 py-3 text-sm text-rose-700" th:text="${error}"></div>

        <form th:action="@{/change-password}" method="post" class="space-y-4">
            <div>
                <label for="currentPassword" class="block text-sm font-medium text-slate-700">Current password</label>
                <input id="currentPassword" name="currentPassword" type="password" required
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
            </div>
            <div>
                <label for="newPassword" class="block text-sm font-medium text-slate-700">New password</label>
                <input id="newPassword" name="newPassword" type="password" required minlength="12"
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
            </div>
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-slate-700">Confirm new password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" required minlength="12"
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2"/>
            </div>
            <button type="submit" class="btn-primary w-full">Update password</button>
        </form>
    </div>
</main>
</body>
</html>
